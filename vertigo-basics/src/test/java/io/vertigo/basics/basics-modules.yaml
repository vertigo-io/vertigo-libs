scope:
  path: io.vertigo.basics.**
  description: "Architecture de vertigo-basics"
  excludes:
    - java.**
    - javax.**
    - jakarta.**
    - io.vertigo.core.**
    - org.apache.logging.**

libs:
  commons: io.vertigo.commons.**
  datamodel: io.vertigo.datamodel.**
  database: io.vertigo.database.**

modules:
  constraint:
    path: io.vertigo.basics.constraint.**
    deps: [datamodel]
  formatter:
    path: io.vertigo.basics.formatter.**
    deps: [datamodel]
  task:
    path: io.vertigo.basics.task.**
    deps: [commons, database, datamodel]
