scope:
  path: io.vertigo.vega.**
  description: "Architecture de vertigo-vega"
  excludes:
    - java.**
    - javax.**
    - jakarta.**
    - io.vertigo.core.**
    - org.apache.logging.**
    - org.slf4j.**
    - org.w3c.**

libs:
  guava: com.google.common.**
  gson: com.google.gson.**
  msal4j: com.microsoft.aad.msal4j.**
  nimbus: com.nimbusds.**
  javalin: io.javalin.**
  shibboleth: net.shibboleth.**
  opensaml: org.opensaml.**
  jedis: redis.clients.**
  commons: io.vertigo.commons.**
  datamodel: io.vertigo.datamodel.**
  datafactory: io.vertigo.datafactory.**
  datastore: io.vertigo.datastore.**
  account: io.vertigo.account.**
  connectors: io.vertigo.connectors.**

directives:
  no-cycle: false
  no-direct-impl-dep: true

modules:
  root:
    path: io.vertigo.vega
    deps: [authentication, engines, impl, plugins, ratelimiting, token, webservice]
  authentication:
    path: io.vertigo.vega.authentication.**
  engines:
    path: io.vertigo.vega.engines.**
    deps: [webservice, gson, datamodel, datafactory]
  ratelimiting:
    path: io.vertigo.vega.ratelimiting.**
  token:
    path: io.vertigo.vega.token.**
  webservice:
    path: io.vertigo.vega.webservice.**
    deps: [datamodel, datastore]
  impl:
    path: io.vertigo.vega.impl.**
    deps: [authentication, engines, plugins, ratelimiting, token, webservice, account, connectors, datafactory, datamodel, datastore, gson] # TODO impl dépend de plugins — violation à corriger
  plugins:
    path: io.vertigo.vega.plugins.**
    deps: [engines, impl, token, webservice, account, connectors, datafactory, datamodel, datastore, gson, msal4j, nimbus, javalin, shibboleth, opensaml, jedis, guava] # TODO plugins dépend de impl — violation circulaire à corriger
