scope:
  path: io.vertigo.datastore.**
  description: "Architecture de vertigo-datastore"
  excludes:
    - java.**
    - javax.**
    - jakarta.**
    - io.vertigo.core.**
    - org.apache.logging.**

libs:
  jedis: redis.clients.**
  ehcache: org.ehcache.**
  minio: io.minio.**
  tika: org.apache.tika.**
  simplemagic: com.j256.**
  sleepycat: com.sleepycat.**
  rocksdb: org.rocksdb.**
  h2mvstore: org.h2.**
  okhttp3: okhttp3.**
  commons: io.vertigo.commons.**
  datamodel: io.vertigo.datamodel.**
  database: io.vertigo.database.**
  basics: io.vertigo.basics.**
  connectors: io.vertigo.connectors.**

modules:
  root:
    path: io.vertigo.datastore
    deps: [cache, entitystore, filestore, kvstore, impl, plugins, datamodel]
  cache:
    path: io.vertigo.datastore.cache.**
  entitystore:
    path: io.vertigo.datastore.entitystore.**
    deps: [basics, commons, database, datamodel]
  filestore:
    path: io.vertigo.datastore.filestore.**
    deps: [impl] # TODO VFileUtil.obtainReadOnlyPath dépend de FSFile (impl) — violation à corriger
  kvstore:
    path: io.vertigo.datastore.kvstore.**
  impl:
    path: io.vertigo.datastore.impl.**
    deps: [cache, entitystore, filestore, kvstore, basics, commons, datamodel]
  plugins:
    path: io.vertigo.datastore.plugins.**
    deps: [cache, entitystore, filestore, kvstore, impl, jedis, ehcache, minio, tika, simplemagic, sleepycat, rocksdb, h2mvstore, okhttp3, basics, commons, connectors, database, datamodel]
