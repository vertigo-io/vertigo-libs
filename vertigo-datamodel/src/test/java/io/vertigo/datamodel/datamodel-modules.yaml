scope:
  path: io.vertigo.datamodel.**
  description: "Architecture de vertigo-datamodel"
  excludes:
    - java.**
    - javax.**
    - jakarta.**
    - io.vertigo.core.**
    - org.apache.logging.**

libs:
  jedis: redis.clients.**
  connectors: io.vertigo.connectors.**

directives:
  no-cycle: false
  no-direct-impl-dep: true

modules:
  root:
    path: io.vertigo.datamodel
    deps: [bb, smarttype, task, impl, plugins]
  bb:
    path: io.vertigo.datamodel.bb.**
  data:
    path: io.vertigo.datamodel.data.**
    deps: [smarttype]
  smarttype:
    path: io.vertigo.datamodel.smarttype.**
    deps: [data]
  criteria:
    path: io.vertigo.datamodel.criteria.**
    deps: [data, smarttype]
  task:
    path: io.vertigo.datamodel.task.**
    deps: [data, smarttype]
  impl:
    path: io.vertigo.datamodel.impl.**
    deps: [bb, data, smarttype, task]
  plugins:
    path: io.vertigo.datamodel.plugins.**
    deps: [bb, impl, jedis, connectors]
