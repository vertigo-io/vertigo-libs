scope:
  path: io.vertigo.datafactory.**
  description: "Architecture de vertigo-datafactory"
  excludes:
    - java.**
    - javax.**
    - jakarta.**
    - io.vertigo.core.**
    - org.apache.logging.**

libs:
  lucene: org.apache.lucene.**
  elasticsearch: org.elasticsearch.**
  hppc: com.carrotsearch.**
  commons: io.vertigo.commons.**
  datamodel: io.vertigo.datamodel.**
  datastore: io.vertigo.datastore.**
  basics: io.vertigo.basics.**
  connectors: io.vertigo.connectors.**

directives:
  no-cycle: false
  no-direct-impl-dep: true

modules:
  root:
    path: io.vertigo.datafactory
    deps: [collections, search, impl, plugins]
  collections:
    path: io.vertigo.datafactory.collections.**
    deps: [datamodel]
  search:
    path: io.vertigo.datafactory.search.**
    deps: [collections, impl, datamodel] # TODO SearchQuery dépend de DslGeoExpression/DslParserUtil (impl) — violation à corriger
  impl:
    path: io.vertigo.datafactory.impl.**
    deps: [collections, search, basics, commons, datamodel, datastore]
  plugins:
    path: io.vertigo.datafactory.plugins.**
    deps: [collections, search, impl, lucene, elasticsearch, hppc, commons, connectors, datamodel, datastore]
