scope:
  path: io.vertigo.account.**
  description: "Architecture de vertigo-account"
  excludes:
    - java.**
    - javax.**
    - jakarta.**
    - io.vertigo.core.**
    - org.apache.logging.**

libs:
  gson: com.google.gson.**
  jedis: redis.clients.**
  commons: io.vertigo.commons.**
  datamodel: io.vertigo.datamodel.**
  datastore: io.vertigo.datastore.**
  database: io.vertigo.database.**
  basics: io.vertigo.basics.**
  connectors: io.vertigo.connectors.**

directives:
  no-cycle: false
  no-direct-impl-dep: false

modules:
  root:
    path: io.vertigo.account
    deps: [account, authentication, authorization, identityprovider, security, impl, plugins]
  security:
    path: io.vertigo.account.security.**
  account:
    path: io.vertigo.account.account.**
    deps: [datamodel, datastore]
  authentication:
    path: io.vertigo.account.authentication.**
    deps: [account]
  authorization:
    path: io.vertigo.account.authorization.**
    deps: [database, datamodel, datastore]
  identityprovider:
    path: io.vertigo.account.identityprovider.**
    deps: [datamodel, datastore]
  impl:
    path: io.vertigo.account.impl.**
    deps: [account, authentication, authorization, identityprovider, security, basics, commons, datamodel, datastore]
  plugins:
    path: io.vertigo.account.plugins.**
    deps: [account, authentication, authorization, impl, commons, connectors, datamodel, datastore, gson, jedis]
