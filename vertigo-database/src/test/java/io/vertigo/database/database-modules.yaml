scope:
  path: io.vertigo.database.**
  description: "Architecture de vertigo-database"
  excludes:
    - java.**
    - javax.**
    - jakarta.**
    - io.vertigo.core.**
    - org.apache.logging.**

libs:
  c3p0: com.mchange.**
  influxdb: com.influxdb.**
  liquibase: liquibase.**
  commons: io.vertigo.commons.**
  connectors: io.vertigo.connectors.**

directives:
  no-cycle: true
  no-direct-impl-dep: true

modules:
  root:
    path: io.vertigo.database
    deps: [sql, migration, timeseries, impl, plugins]
  sql:
    path: io.vertigo.database.sql.**
    deps: [commons]
  migration:
    path: io.vertigo.database.migration.**
  timeseries:
    path: io.vertigo.database.timeseries.**
  impl:
    path: io.vertigo.database.impl.**
    deps: [sql, migration, timeseries]
  plugins:
    path: io.vertigo.database.plugins.**
    deps: [sql, timeseries, impl, c3p0, influxdb, liquibase, connectors]
