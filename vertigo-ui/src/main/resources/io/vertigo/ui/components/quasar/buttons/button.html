<th:block th:fragment="button(label, icon, color, text-color, title, v-title, other_attrs)"
      th:assert="(${label} != null or (${icon} != null and (${title} != null or ${vTitle} != null)))">
    <q-btn th:icon="${icon?:''}" th:label="${label?:''}" th:title="${vTitle==null?title?:'':''}" th::title="${vTitle?:''}" 
           th::round="${label==null?'true':''}" th:color="${color?:'primary'}" th:text-color="${textColor?:''}" th:attr="__${other_attrs}__">
           <vu:content>
               <span class="sr-only" th:if="${label==null && vTitle==null}" vu:text="${title?:''}"></span>
               <span class="sr-only" th:if="${label==null && vTitle!=null}" th:text="|{{${vTitle?:''}}}|"></span>
           </vu:content>
    </q-btn>
</th:block>
<th:block th:fragment="button-confirm(actions_slot, key, label, icon, color, text-color, title, v-title, confirmMessage, labelOk, labelCancel, ok_attrs, other_attrs)"
          th:assert="(${label} != null or (${icon} != null and (${title} != null or ${vTitle} != null)))"
          th:with="myComponentId=${model.util.generateComponentUID('button', null, null, null)},
                   myKey=${key?:'(props?.rowIndex || ``)'},
                   myLabelOk=${labelOk?:'Oui'},
                   myLabelCancel=${labelCancel?:'Non'}">
    <q-btn th:icon="${icon?:''}" th:label="${label?:''}" th:title="${vTitle==null?title?:'':''}" th::title="${vTitle?:''}" 
           th::round="${label==null?'true':''}" th:color="${color?:'primary'}" th:text-color="${textColor?:''}" th:@click="|$refs['${myComponentId}'+ ${myKey}].show()|"
           th:attr="__${other_attrs}__">
        <span class="sr-only" th:if="${label==null && vTitle==null}" vu:text="${title?:''}"></span>
        <span class="sr-only" th:if="${label==null && vTitle!=null}" th:text="|{{${vTitle?:''}}}|"></span>
        <q-dialog th::ref="|'${myComponentId}' + ${myKey}|" persistent>
            <q-card>
                <q-card-section class="row items-center">
                    <vu:content>
                        <span class="q-ml-sm" vu:text="${confirmMessage}"></span>
                    </vu:content>
                </q-card-section>
                <q-card-actions align="right" vu:slot="actions_slot">
                    <q-btn flat th:label="${myLabelCancel}" color="primary" v-close-popup></q-btn>
                    <q-btn th:label="${myLabelOk}" th:attr="__${ok_attrs}__" v-close-popup>
                    <span class="sr-only" th:if="${label==null}" vu:text="${title?:''}"></span></q-btn>
                </q-card-actions>
            </q-card>
        </q-dialog>
    </q-btn>
</th:block>
